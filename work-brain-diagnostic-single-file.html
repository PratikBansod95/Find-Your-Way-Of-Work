<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Work Brain Diagnostic</title>
  <meta name="description" content="Discover your work brain type and share your result." />
  <meta property="og:title" content="Work Brain Diagnostic" />
  <meta property="og:description" content="Discover your work brain type and compare it with your team." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://find-your-way-of-work.vercel.app/og-preview.svg" />
  <meta property="og:url" content="https://find-your-way-of-work.vercel.app/" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Work Brain Diagnostic" />
  <meta name="twitter:description" content="Discover your work brain type and compare it with your team." />
  <meta name="twitter:image" content="https://find-your-way-of-work.vercel.app/og-preview.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
:root {
  --bg: #eef1f8;
  --card: #ffffff;
  --ink: #111827;
  --muted: #5b6474;
  --line: #dde2ec;
  --primary: #5a2dde;
  --primary-ink: #ffffff;
  --soft: #f5f7fc;
  --good: #16a34a;
  --warn: #f59e0b;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: "Plus Jakarta Sans", "Segoe UI", sans-serif;
  background: radial-gradient(90% 60% at 50% -10%, rgba(111, 76, 247, 0.14), transparent 60%), var(--bg);
  color: var(--ink);
  min-height: 100vh;
}

.quiz-shell {
  width: min(100%, 1280px);
  margin: clamp(18px, 4vw, 32px) auto clamp(32px, 6vw, 64px);
  padding: 0 clamp(12px, 2.4vw, 24px);
}

.topbar {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 18px;
}

.logo-box {
  width: 48px;
  height: 48px;
  border-radius: 14px;
  background: #131826;
  color: #fff;
  display: grid;
  place-items: center;
  font-weight: 800;
}

.topbar h1 {
  margin: 0;
  font-size: clamp(24px, 2.1vw, 36px);
}

.topbar p {
  margin: 3px 0 0;
  color: var(--muted);
  font-size: clamp(14px, 1vw, 17px);
}

.panel {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 24px;
  box-shadow: 0 8px 22px rgba(17, 24, 39, 0.08);
}

.panel-pad {
  padding: clamp(18px, 3vw, 34px);
}

.badge-row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}

.badge {
  border-radius: 999px;
  padding: 6px 12px;
  font-size: 12px;
  font-weight: 700;
  background: #e8ecf8;
  color: #344155;
}

.badge.dark {
  background: #0f172a;
  color: #fff;
}

.hero-title {
  margin: 0;
  line-height: 1.15;
  font-size: clamp(30px, 2.8vw, 52px);
}

.hero-desc {
  margin: 16px 0 0;
  max-width: min(920px, 100%);
  color: var(--muted);
  line-height: 1.65;
  font-size: clamp(15px, 1.1vw, 19px);
}

.intro-visual-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 14px;
  margin-top: 24px;
}

.archetype-tile {
  border-radius: 20px;
  padding: 18px 14px 16px;
  background: linear-gradient(180deg, #f9fbff 0%, #eef3fb 100%);
  text-align: center;
  box-shadow: 0 10px 24px rgba(17, 24, 39, 0.06);
}

.archetype-mark {
  width: 54px;
  height: 54px;
  margin: 0 auto 12px;
  border-radius: 18px;
  display: grid;
  place-items: center;
  font-size: 20px;
  font-weight: 800;
  color: #1d2740;
  background: linear-gradient(135deg, rgba(90, 45, 222, 0.18), rgba(255, 255, 255, 0.96));
}

.archetype-tile strong {
  display: block;
  font-size: 17px;
  letter-spacing: -0.02em;
  color: #1b2438;
}

.archetype-tile span {
  display: block;
  margin-top: 4px;
  color: #647084;
  font-size: 13px;
}

.two-col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 18px;
  margin-top: 24px;
}

.info-card {
  border-radius: 18px;
  padding: 20px;
  background: var(--soft);
}

.info-title {
  margin: 0 0 10px;
  font-size: 16px;
  font-weight: 700;
}

.info-card p {
  margin: 0 0 8px;
  color: var(--muted);
  line-height: 1.55;
}

.actions {
  margin-top: 18px;
  display: flex;
  align-items: center;
  gap: 14px;
  flex-wrap: wrap;
}

.actions .name-box {
  margin-top: 0;
  flex: 1 1 320px;
  max-width: 420px;
}

.btn {
  border: 0;
  border-radius: 14px;
  padding: 14px 22px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
}

.btn.primary {
  background: var(--primary);
  color: var(--primary-ink);
}

.btn.secondary {
  background: #fff;
  border: 1px solid var(--line);
  color: #243042;
}

.btn:disabled {
  cursor: not-allowed;
  opacity: 0.55;
}

.inline-note {
  color: var(--muted);
  font-size: 14px;
}

.name-box {
  margin-top: 22px;
  max-width: 520px;
}

.field-label {
  display: block;
  margin-bottom: 8px;
  font-size: 14px;
  font-weight: 700;
  color: #243042;
}

.text-input {
  width: 100%;
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 14px 16px;
  font: inherit;
  color: var(--ink);
  background: #fff;
}

.text-input:focus {
  outline: 2px solid rgba(90, 45, 222, 0.18);
  border-color: #7f54ff;
}

.stats-inline {
  margin: 0;
  color: #344155;
  font-size: 14px;
  font-weight: 600;
}

.stats-panel {
  margin-top: 14px;
  display: inline-flex;
  flex-wrap: wrap;
  gap: 10px;
}

.stats-chip {
  border-radius: 999px;
  padding: 8px 12px;
  background: #eef2ff;
  color: #2f3b52;
  font-size: 13px;
  font-weight: 700;
}

.muted-note {
  margin-top: 12px;
}

.admin-shell {
  display: grid;
  gap: 18px;
}

.admin-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 14px;
}

.admin-card {
  border: 1px solid var(--line);
  border-radius: 18px;
  background: #f8fbff;
  padding: 18px;
}

.admin-card h3 {
  margin: 0 0 8px;
  font-size: 13px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: #5b6474;
}

.admin-metric {
  margin: 0;
  font-size: 30px;
  font-weight: 800;
  color: #111827;
}

.admin-table-wrap {
  overflow: auto;
  border: 1px solid var(--line);
  border-radius: 18px;
  background: #fff;
}

.admin-table {
  width: 100%;
  border-collapse: collapse;
  min-width: 760px;
}

.admin-table th,
.admin-table td {
  padding: 12px 14px;
  text-align: left;
  border-bottom: 1px solid #e6eaf2;
  font-size: 14px;
  vertical-align: top;
}

.admin-table th {
  background: #f7f9fd;
  color: #475467;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

.pill {
  display: inline-flex;
  align-items: center;
  border-radius: 999px;
  padding: 4px 10px;
  background: #eef2ff;
  color: #344155;
  font-size: 12px;
  font-weight: 700;
}

.share-copy {
  margin: 0;
  color: #1f2a3a;
  font-weight: 600;
}

.score-share {
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px dashed #dde5f2;
}

.score-share .actions {
  margin-top: 10px;
}

.btn.glow {
  box-shadow: 0 0 0 rgba(90, 45, 222, 0.4);
  animation: breatheGlow 2.4s ease-in-out infinite;
}

@keyframes breatheGlow {
  0% {
    transform: scale(1);
    box-shadow: 0 0 0 0 rgba(90, 45, 222, 0.45);
  }
  50% {
    transform: scale(1.03);
    box-shadow: 0 0 0 12px rgba(90, 45, 222, 0);
  }
  100% {
    transform: scale(1);
    box-shadow: 0 0 0 0 rgba(90, 45, 222, 0);
  }
}

.progress-wrap {
  margin-bottom: 14px;
}

.progress-meta {
  display: flex;
  justify-content: space-between;
  color: var(--muted);
  font-size: 14px;
  margin-bottom: 8px;
}

.progress-track {
  height: 8px;
  background: #e9edf5;
  border-radius: 999px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #5b2fde, #7f54ff);
}

.category {
  margin: 0;
  color: #44526b;
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 0.02em;
  text-transform: uppercase;
}

.question {
  margin: 10px 0 8px;
  line-height: 1.22;
  font-size: clamp(26px, 2.15vw, 42px);
}

.options {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(min(100%, 280px), 1fr));
  gap: 14px;
  margin-top: 22px;
}

.option {
  border: 1px solid var(--line);
  border-radius: 18px;
  padding: 16px;
  background: #fff;
  text-align: left;
  cursor: pointer;
}

.option:hover {
  border-color: #bec8da;
  box-shadow: 0 8px 18px rgba(15, 23, 42, 0.06);
}

.option-id {
  width: 34px;
  height: 34px;
  border-radius: 11px;
  background: #eff3f9;
  display: grid;
  place-items: center;
  font-weight: 700;
  margin-bottom: 12px;
}

.option p {
  margin: 0;
  color: #374151;
  line-height: 1.55;
}

.result-head {
  margin-bottom: 20px;
}

.result-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 16px;
}

.result-head h2 {
  margin: 8px 0 0;
  line-height: 1.15;
  font-size: clamp(30px, 2.65vw, 48px);
}

.accent {
  color: #4b2ec8;
}

.result-grid {
  display: grid;
  grid-template-columns: minmax(0, 1.2fr) minmax(300px, 0.8fr);
  gap: 18px;
}

.block {
  border-radius: 18px;
  padding: 18px;
}

.block.soft {
  background: #f7f9fd;
}

.block.white {
  background: #fff;
  border: 1px solid var(--line);
}

.block h3 {
  margin: 0 0 8px;
  font-size: 14px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: #4b5563;
}

.block p {
  margin: 0 0 10px;
  color: #364152;
  line-height: 1.62;
}

.metric {
  margin: 0 0 12px;
}

.metric-line {
  display: flex;
  justify-content: space-between;
  margin-bottom: 6px;
  font-size: 13px;
}

.metric-track {
  height: 7px;
  border-radius: 999px;
  background: #e8edf6;
  overflow: hidden;
}

.metric-fill {
  height: 100%;
  background: linear-gradient(90deg, #5630d5, #7c56f0);
}

.pie-layout {
  display: grid;
  grid-template-columns: minmax(150px, 190px) minmax(0, 1fr);
  gap: 16px;
  align-items: center;
}

.pie-chart {
  width: min(190px, 100%);
  aspect-ratio: 1;
  border-radius: 50%;
  position: relative;
  border: 1px solid #d8e0ee;
}

.pie-center {
  position: absolute;
  inset: 22%;
  background: #fff;
  border-radius: 50%;
  display: grid;
  place-items: center;
  text-align: center;
  border: 1px solid #e1e7f3;
}

.pie-center strong {
  display: block;
  font-size: 24px;
  line-height: 1.1;
}

.pie-center span {
  display: block;
  font-size: 12px;
  color: #667085;
}

.pie-legend {
  display: grid;
  gap: 8px;
}

.legend-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 14px;
  color: #273245;
}

.legend-label {
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

.legend-label i {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  display: inline-block;
}

.split {
  margin-top: 18px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(min(100%, 320px), 1fr));
  gap: 18px;
}

.warn-box {
  border-radius: 14px;
  padding: 14px;
  background: #fff6e5;
  border: 1px solid #fde4b4;
  margin-bottom: 12px;
}

.warn-box h4 {
  margin: 0;
  font-size: 16px;
}

.warn-box p {
  margin: 8px 0 0;
}

.warn-fix {
  margin-top: 8px;
  font-size: 13px;
  color: #8a5c00;
  font-weight: 700;
}

.result-shell {
  display: grid;
  gap: 22px;
}

.result-hero-card {
  position: relative;
  overflow: hidden;
  border-radius: 26px;
  padding: clamp(20px, 3vw, 28px);
  background: linear-gradient(135deg, rgba(245, 247, 252, 0.95), rgba(255, 255, 255, 0.92));
  border: 1px solid rgba(198, 206, 224, 0.7);
}

.result-hero-grid {
  display: grid;
  grid-template-columns: minmax(280px, 0.92fr) minmax(0, 1.08fr);
  gap: 20px;
  align-items: center;
}

.result-chip {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  border-radius: 999px;
  padding: 8px 14px;
  background: #dbf6e9;
  color: #17603d;
  font-size: 13px;
  font-weight: 800;
}

.result-label {
  margin: 16px 0 0;
  color: #453866;
  font-size: 14px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  font-weight: 800;
}

.identity-stack {
  margin-top: 18px;
  display: grid;
  gap: 8px;
}

.identity-primary {
  margin: 0;
  font-size: clamp(42px, 7vw, 86px);
  line-height: 0.9;
  letter-spacing: -0.05em;
  font-weight: 800;
}

.identity-secondary {
  margin: 0;
  color: #332b5a;
  font-size: clamp(22px, 3vw, 40px);
  line-height: 1;
  letter-spacing: -0.04em;
  font-weight: 700;
}

.identity-tagline {
  margin: 8px 0 0;
  color: #4f4b72;
  font-size: clamp(18px, 2vw, 28px);
  line-height: 1.35;
  font-weight: 500;
}

.rarity-hook {
  margin: 18px 0 0;
  color: #1f2540;
  font-size: clamp(24px, 3.2vw, 40px);
  line-height: 1.15;
  font-weight: 700;
  text-align: center;
}

.hero-divider {
  border-top: 1px solid rgba(218, 223, 236, 0.9);
  padding-top: 18px;
}

.hero-prompt {
  margin: 0 0 16px;
  color: #6a6887;
  font-size: clamp(18px, 2vw, 22px);
  text-align: center;
}

.share-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
}

.share-actions .btn {
  min-height: 52px;
}

.share-actions .btn.primary {
  box-shadow: 0 16px 34px rgba(90, 45, 222, 0.2);
}

.btn.icon-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}

.share-socials {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.social-link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  border-radius: 14px;
  background: #fff;
  border: 1px solid rgba(205, 213, 229, 0.9);
  color: #1f2940;
  font-weight: 700;
  text-decoration: none;
}

.social-mark {
  width: 24px;
  height: 24px;
  border-radius: 8px;
  display: grid;
  place-items: center;
  background: #eef2ff;
  font-size: 12px;
  font-weight: 800;
}

.visual-card {
  position: relative;
  min-height: 360px;
  border-radius: 26px;
  overflow: hidden;
  padding: 24px;
  color: #1f2240;
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.45);
}

.visual-card::before,
.visual-card::after {
  content: "";
  position: absolute;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.22);
  filter: blur(2px);
}

.visual-card::before {
  width: 260px;
  height: 260px;
  right: -54px;
  top: -70px;
}

.visual-card::after {
  width: 180px;
  height: 180px;
  left: -36px;
  bottom: -60px;
}

.visual-card-pattern {
  position: absolute;
  inset: 0;
  background-image:
    radial-gradient(circle at 18% 24%, rgba(255,255,255,0.42) 0 2px, transparent 2px),
    radial-gradient(circle at 78% 30%, rgba(255,255,255,0.35) 0 3px, transparent 3px),
    radial-gradient(circle at 66% 72%, rgba(255,255,255,0.3) 0 2px, transparent 2px);
  pointer-events: none;
}

.visual-card-inner {
  position: relative;
  z-index: 1;
  height: 100%;
  display: grid;
  align-content: space-between;
  gap: 18px;
}

.visual-kicker {
  font-size: 13px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  font-weight: 800;
}

.visual-icon {
  width: 92px;
  height: 92px;
  border-radius: 28px;
  display: grid;
  place-items: center;
  font-size: 42px;
  font-weight: 800;
  background: rgba(255, 255, 255, 0.25);
  backdrop-filter: blur(12px);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.4);
}

.visual-primary {
  margin: 0;
  font-size: clamp(38px, 5vw, 62px);
  line-height: 0.92;
  letter-spacing: -0.05em;
  font-weight: 800;
}

.visual-secondary {
  margin: 0;
  font-size: clamp(22px, 2.7vw, 34px);
  line-height: 1;
  letter-spacing: -0.04em;
  font-weight: 700;
}

.visual-caption {
  margin: 0;
  font-size: clamp(18px, 2vw, 26px);
  line-height: 1.25;
  font-weight: 500;
}

.visual-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  color: rgba(31, 34, 64, 0.82);
  font-size: 15px;
  font-weight: 700;
}

.confetti-burst {
  position: absolute;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
}

.confetti-bit {
  position: absolute;
  width: 9px;
  height: 16px;
  border-radius: 999px;
  opacity: 0;
  animation: confettiRise 1.2s ease-out forwards;
}

@keyframes confettiRise {
  0% { transform: translateY(18px) rotate(0deg); opacity: 0; }
  20% { opacity: 1; }
  100% { transform: translateY(-80px) rotate(180deg); opacity: 0; }
}

.profile-grid {
  display: grid;
  grid-template-columns: minmax(240px, 0.82fr) minmax(0, 1.18fr);
  gap: 20px;
  align-items: stretch;
}

.profile-card,
.insight-card,
.action-card,
.details-card {
  border-radius: 24px;
  background: #fff;
  border: 1px solid rgba(219, 225, 238, 0.9);
  box-shadow: 0 10px 26px rgba(17, 24, 39, 0.05);
}

.profile-card,
.insight-card,
.details-card {
  padding: 22px;
}

.section-title {
  margin: 0 0 18px;
  color: #4a3e72;
  font-size: 14px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  font-weight: 800;
}

.donut-wrap {
  display: grid;
  gap: 18px;
  justify-items: center;
}

.donut-svg {
  width: min(240px, 100%);
  aspect-ratio: 1;
}

.donut-track {
  fill: none;
  stroke: #edf1f7;
  stroke-width: 18;
}

.donut-segment {
  fill: none;
  stroke-width: 18;
  stroke-linecap: round;
  stroke-dasharray: 0 var(--gap);
  stroke-dashoffset: var(--offset);
  animation: donutFill 1s cubic-bezier(0.2, 0.9, 0.2, 1) forwards;
  animation-delay: var(--delay);
}

@keyframes donutFill {
  to {
    stroke-dasharray: var(--arc) var(--gap);
  }
}

.donut-total {
  font-size: 13px;
  fill: #6b7280;
}

.donut-score {
  font-size: 24px;
  font-weight: 800;
  fill: #111827;
}

.profile-list {
  display: grid;
  gap: 12px;
}

.profile-row {
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 12px;
  align-items: center;
  padding: 14px 0;
  border-bottom: 1px solid #edf1f7;
}

.profile-row:last-child {
  border-bottom: 0;
}

.profile-icon {
  width: 42px;
  height: 42px;
  border-radius: 14px;

let step = 0;

const STORAGE_KEYS = {

  sessionId: "workBrainSessionId",
};
const sessionId = getOrCreateSessionId();

nickname = readStorage(STORAGE_KEYS.nickname) || "";

function readStorage(key) {
  try {
    return localStorage.getItem(key);
  } catch {
    return null;
  }
}

function writeStorage(key, value) {
  try {
    localStorage.setItem(key, value);
  } catch {
    // Ignore storage failures.
  }
}

function getOrCreateSessionId() {
  const existing = readStorage(STORAGE_KEYS.sessionId);
  if (existing) return existing;

  const created =
    typeof crypto !== "undefined" && crypto.randomUUID
      ? crypto.randomUUID()
      : `wb-${Date.now()}-${Math.random().toString(36).slice(2, 10)}`;

  writeStorage(STORAGE_KEYS.sessionId, created);
  return created;
}

function canUseAnalytics() {
  return window.location.protocol === "http:" || window.location.protocol === "https:";
}

function escapeHtml(value) {
  return String(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#39;");
}

const SPECIAL_COMBO_HOOKS = {

};

function getArchetypeVisual(key) {
  return ARCHETYPE_VISUALS[key] || ARCHETYPE_VISUALS.builder;
}

function getComboGradient(primary, secondary) {
  const primaryVisual = getArchetypeVisual(primary);
  const secondaryVisual = getArchetypeVisual(secondary);
  return `linear-gradient(135deg, ${primaryVisual.secondary} 0%, #ffffff 45%, ${secondaryVisual.secondary} 100%)`;
}

function getHeroTagline(summary) {
  return getArchetypeVisual(summary.primary).tagline;
}

function getShareTagline(summary) {
  return `${getArchetypeVisual(summary.primary).shareTag} ${getArchetypeVisual(summary.secondary).shareTag}`;
}

function getRarityHook(scores, summary) {
  const special = SPECIAL_COMBO_HOOKS[`${summary.primary}:${summary.secondary}`];
  if (special) return special;

  const topScore = scores[summary.primary] || 0;
  const secondScore = scores[summary.secondary] || 0;
  const rarity = Math.max(9, Math.min(22, Math.round(24 - (topScore + secondScore) / 2 - (topScore - secondScore))));
  return `Only ${rarity}% of people have this combination.`;
}

function getTopPercentLabel(value) {
  const topPercent = Math.max(8, Math.min(38, Math.round(42 - value * 2.2)));
  return `Top ${topPercent}%`;
}

function getSharePayload(summary, scores) {
  const displayName = getDisplayName();
  const appUrl = getAppShareUrl();

    `${displayName ? `${displayName}'s` : "My"} work brain is ${combo}.\n\n` +
    `${tagline}\n\n` +
    `What's yours?\n${appUrl}`;

  return {

    text,

    "twitter:description": payload.text,
  };

  Object.entries(meta).forEach(([name, content]) => {
    const selector = name.startsWith("og:")
      ? `meta[property="${name}"]`
      : `meta[name="${name}"]`;
    const tag = document.querySelector(selector);
    if (tag) tag.setAttribute("content", content);
  });
}

function buildDonutSvg(profile) {
  const radius = 44;
  const circumference = 2 * Math.PI * radius;
  let offset = 0;

  const segments = profile
    .map((item, index) => {
      const arc = (item.value / 30) * circumference;
      const segment = `
        <circle
          class="donut-segment"
          cx="60"
          cy="60"
          r="${radius}"
          stroke="${item.color}"
          style="--arc:${arc}; --gap:${circumference}; --offset:${-offset}; --delay:${index * 120}ms"
          transform="rotate(-90 60 60)"
        ></circle>
      `;
      offset += arc;
      return segment;
    })
    .join("");

  return `
    <svg class="donut-svg" viewBox="0 0 120 120" role="img" aria-label="Score profile donut chart">
      <circle class="donut-track" cx="60" cy="60" r="${radius}"></circle>
      ${segments}
      <text x="60" y="57" text-anchor="middle" class="donut-score">30</text>
      <text x="60" y="75" text-anchor="middle" class="donut-total">Total</text>
    </svg>
  `;
}

}

function normalizeScoresToThirty(scores) {
  const entries = Object.entries(scores);
  const totalRaw = entries.reduce((sum, [, value]) => sum + value, 0);
  if (!totalRaw) return { strategist: 0, explorer: 0, connector: 0, builder: 0 };

  const scaled = entries.map(([key, value]) => {
    const exact = (value / totalRaw) * 30;
    const floored = Math.floor(exact);
    return { key, exact, floored, remainder: exact - floored };
  });

  let allocated = scaled.reduce((sum, item) => sum + item.floored, 0);
  let remaining = 30 - allocated;

  scaled
    .sort((a, b) => b.remainder - a.remainder)
    .forEach((item) => {
      if (remaining > 0) {
        item.floored += 1;
        remaining -= 1;
      }
    });

  return scaled.reduce((acc, item) => {
    acc[item.key] = item.floored;
    return acc;
  }, {});
}

function getTopTwo(scores) {

    .sort((a, b) => b[1] - a[1])

}

function getAntiPatterns(scores) {
  const { strategist, explorer, connector, builder } = scores;
  const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
  const top = sorted[0][0];
  const second = sorted[1][0];
  const gap = sorted[0][1] - sorted[1][1];
  const patterns = [];

  if (explorer >= 18 && builder <= 12) {
    patterns.push({
      title: "Scattered Momentum",
      body: "You are good at generating motion, but some of your energy leaks into parallel starts. This feels exciting in the moment and expensive a week later.",
      fix: "Cap active experiments at 2. Keep a visible kill list.",
    });
  }

  if (strategist >= 18 && builder <= 12) {
    patterns.push({
      title: "Elegant Delay",
      body: "You probably see the problem better than most people around you. But insight can become a hiding place if it never converts into a test or decision.",
      fix: "For every reframing, force one concrete next move within 24 hours.",
    });
  }

  if (connector >= 18 && strategist + builder < 30) {
    patterns.push({
      title: "Alignment Gravity",
      body: "You may be spending too much energy keeping the room coherent. Useful, yes. But progress stalls when the group feeling becomes more important than the actual move.",
      fix: "Set explicit decision points: input ends here, action starts here.",
    });
  }

  if (builder >= 18 && strategist <= 12) {
    patterns.push({
      title: "Execution Treadmill",
      body: "You are likely trusted because you get things done. The danger is becoming productive on tasks that should never have existed.",
      fix: "Before execution, write: what changes if this works?",
    });
  }

  if (gap <= 2) {
    patterns.push({
      title: "Hybrid Brain",
      body: "Your work style is mixed rather than pure. That is usually a strength. The catch: hybrids need stronger operating rules, otherwise you switch modes too often and feel inconsistent.",
      fix: "Choose a default mode for each project phase based on your top two styles.",
    });
  }

  if (patterns.length === 0) {
    patterns.push({
      title: "Stable Core, Predictable Blind Spot",
      body: `Your strongest mode is ${DIMENSIONS[top].label}. That gives you repeatable value. It also creates a predictable blind spot whenever you overuse it.`,
      fix: `Borrow one behavior each week from ${DIMENSIONS[second].label} to stay balanced.`,
    });
  }

  return patterns.slice(0, 2);
}

function getSummary(scores) {
  const [primary, secondary] = getTopTwo(scores);
  const primaryMeta = DIMENSIONS[primary];
  const secondaryMeta = DIMENSIONS[secondary];

  const strengths = [
    `Your dominant mode is ${primaryMeta.label}. ${primaryMeta.strength}`,
    `Your secondary mode is ${secondaryMeta.label}. This means you are not one-dimensional; you have a useful backup pattern when work gets messy.`,
    `You are most effective when the job lets you combine ${primaryMeta.label.toLowerCase()} energy with ${secondaryMeta.label.toLowerCase()} discipline.`,
  ];

  const wrong = {
    strategist: "You may spend too long sharpening the lens and not enough time exposing it to reality.",
    explorer: "You may confuse fresh motion with meaningful progress.",
    connector: "You may wait for social confidence before taking directional risk.",
    builder: "You may solve what is in front of you instead of questioning whether it deserves solving.",
  };

  const right = {
    strategist: "You usually improve the quality of the question before the team burns effort on the answer.",
    explorer: "You create signal faster than people who need full certainty to move.",
    connector: "You lower friction and make progress easier for groups, not just for yourself.",
    builder: "You convert ambiguity into visible output, which is rarer than people think.",
  };

  const actionPlan = [
    `This week: lean into what already works. ${right[primary]}`,
    `Watch the trap. ${wrong[primary]}`,
    `Upgrade path: ${primaryMeta.improve}`,
    `Multiplier move: borrow one habit from ${secondaryMeta.label}. ${secondaryMeta.improve}`,
  ];

  const hook =
    primary === "strategist" && secondary === "explorer"
      ? "You have a high-leverage product brain: you can see the shape of the problem and still move fast enough to learn. Your main risk is mode-switching chaos."
      : primary === "explorer" && secondary === "builder"
      ? "You are dangerous in the good way: fast start, real output. Your main risk is clutter from too many partially-alive ideas."
      : primary === "connector" && secondary === "builder"
      ? "You are the kind of operator teams secretly depend on: people move because you move and they trust you. Your risk is absorbing too much of the org's mess."
      : primary === "builder" && secondary === "strategist"
      ? "You have one of the strongest combinations for hard environments: you can ship, and you can think. Your risk is only using the second part when things are already on fire."
      : `Your work style is ${primaryMeta.label} with a strong ${secondaryMeta.label} layer. That mix is more useful than a pure type, but only if you know when each mode should drive.`;

  return {
    primary,
    secondary,
    hook,
    strengths,
    actionPlan,
    insider: `${primaryMeta.insider} ${secondaryMeta.insider}`,
    antiPatterns: getAntiPatterns(scores),
  };
}

async function copyTextToClipboard(text) {
  if (navigator.clipboard) {
    await navigator.clipboard.writeText(text);
    return;
  }

  const tempArea = document.createElement("textarea");
  tempArea.value = text;
  tempArea.style.position = "fixed";
  tempArea.style.opacity = "0";
  document.body.appendChild(tempArea);
  tempArea.focus();
  tempArea.select();
  document.execCommand("copy");
  document.body.removeChild(tempArea);
}

function openSharePopup(message) {
  const existing = document.querySelector(".share-modal-overlay");
  if (existing) existing.remove();

  const overlay = document.createElement("div");
  overlay.className = "share-modal-overlay";
  overlay.innerHTML = `
    <div class="share-modal" role="dialog" aria-modal="true" aria-label="Share quiz">
      <button type="button" class="share-close-btn" id="close-share-btn" aria-label="Close share popup">×</button>
      <h3>Share</h3>
      <textarea readonly>${message}</textarea>
      <div class="share-modal-actions">
        <button type="button" class="btn primary share-copy-btn" id="copy-share-btn">COPY MESSAGE</button>
      </div>
    </div>
  `;

  const close = () => overlay.remove();
  overlay.addEventListener("click", (event) => {
    if (event.target === overlay) close();
  });
  document.addEventListener(
    "keydown",
    (event) => {
      if (event.key === "Escape") close();
    },
    { once: true }
  );

  document.body.appendChild(overlay);

  const copyBtn = overlay.querySelector("#copy-share-btn");
  const closeBtn = overlay.querySelector("#close-share-btn");
  copyBtn?.addEventListener("click", async () => {
    try {
      await copyTextToClipboard(message);
      copyBtn.textContent = "Copied";
    } catch {
      copyBtn.textContent = "Copy failed";
    }
  });
  closeBtn?.addEventListener("click", close);
}

async function shareQuizTracked() {
  const hydratedScores = forcedSavedResult?.rawScores || forcedSavedResult?.normalizedScores || getScores();
  const summary = forcedSavedResult?.summary || getSummary(hydratedScores);
  const scores = normalizeScoresToThirty(hydratedScores);
  const payload = getSharePayload(summary, scores);

  if (navigator.share) {
    try {
      await navigator.share({
        title: payload.title,
        text: payload.text,
        url: payload.appUrl,
      });
      await trackEvent("share", {
        primary: summary?.primary || null,
        secondary: summary?.secondary || null,
      });
      return;
    } catch {
      // Fall back to custom popup below.
    }
  }

  openTrackedSharePopup(payload.text, summary);
}

async function copyResultLink() {
  await copyTextToClipboard(getAppShareUrl());
}

async function challengeTeam(summary, scores) {
  const payload = getSharePayload(summary, scores);
  const challengeMessage = `I got ${payload.combo} on Work Brain Diagnostic. Beat it or match it:\n${payload.appUrl}`;
  await copyTextToClipboard(challengeMessage);
  await trackEvent("share", {
    primary: summary?.primary || null,
    secondary: summary?.secondary || null,
  });
}

function openTrackedSharePopup(message, summary) {
  const existing = document.querySelector(".share-modal-overlay");
  if (existing) existing.remove();

  const overlay = document.createElement("div");
  overlay.className = "share-modal-overlay";
  overlay.innerHTML = `
    <div class="share-modal" role="dialog" aria-modal="true" aria-label="Share quiz">
      <button type="button" class="share-close-btn" id="close-share-btn" aria-label="Close share popup">&times;</button>
      <h3>Share</h3>
      <textarea readonly>${message}</textarea>
      <div class="share-modal-actions">
        <button type="button" class="btn primary share-copy-btn" id="copy-share-btn">COPY MESSAGE</button>
      </div>
    </div>
  `;

  const close = () => overlay.remove();
  overlay.addEventListener("click", (event) => {
    if (event.target === overlay) close();
  });
  document.addEventListener(
    "keydown",
    (event) => {
      if (event.key === "Escape") close();
    },
    { once: true }
  );

  document.body.appendChild(overlay);

  const copyBtn = overlay.querySelector("#copy-share-btn");
  const closeBtn = overlay.querySelector("#close-share-btn");
  copyBtn?.addEventListener("click", async () => {
    try {
      await copyTextToClipboard(message);
      await trackEvent("share", {
        primary: summary?.primary || null,
        secondary: summary?.secondary || null,
      });
      copyBtn.textContent = "Copied";
    } catch {
      copyBtn.textContent = "Copy failed";
    }
  });
  closeBtn?.addEventListener("click", close);
}

function tryHydrateSavedResultMode() {
  if (window.location.hash !== "#result") return;

  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEYS.latestResult) || "null");
    if (saved && (saved.rawScores || saved.normalizedScores)) {
      forcedSavedResult = saved;
      nickname = saved.nickname || nickname;
      completionTracked = true;
      step = QUESTIONS.length + 2;
    }
  } catch {
    // Ignore invalid local storage payload.
  }
}

function renderAnalyzing() {
  return `
    <section class="topbar">
      <div class="logo-box">WB</div>
      <div>
        <h1>Work Brain Diagnostic</h1>
        <p>Analyzing your responses...</p>
      </div>
    </section>

    <section class="panel panel-pad analyzing-screen">
      <div class="pulse-ring" aria-hidden="true"></div>
      <h2>Analyzing your natural work pattern</h2>
      <p>
        We are comparing your response behavior across decision style, momentum, execution, and collaboration signals.
      </p>
      <div class="analyzing-bar">
        <span></span>
      </div>
      <small>This takes around 5 seconds.</small>
    </section>
  `;
}

function render() {
  const isIntro = step === 0;
  const isQuiz = step > 0 && step <= QUESTIONS.length;
  const isAnalyzing = step === QUESTIONS.length + 1;
  const isResult = step > QUESTIONS.length + 1;

  if (adminMode) {
    app.innerHTML = renderAdminDashboard();
    document.getElementById("refresh-admin-btn")?.addEventListener("click", refreshAdminData);
    document.getElementById("back-admin-btn")?.addEventListener("click", () => {
      adminMode = false;
      nickname = "";
      writeStorage(STORAGE_KEYS.nickname, "");
      render();
    });
    return;
  }

  if (isIntro) {
    app.innerHTML = renderIntroScreen();
    const nicknameInput = document.getElementById("nickname-input");
    const startButton = document.getElementById("start-btn");

    nicknameInput?.addEventListener("input", () => {
      nickname = nicknameInput.value.trimStart();
      writeStorage(STORAGE_KEYS.nickname, nickname);
      startButton.disabled = !nickname.trim();
    });

    nicknameInput?.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !startButton.disabled) {
        startButton.click();
      }
    });

    document.getElementById("start-btn").addEventListener("click", () => {
      const enteredName = nicknameInput?.value.trim() || nickname.trim();
      if (!enteredName) return;

      if (enteredName === ADMIN_ACCESS_CODE) {
        adminMode = true;
        refreshAdminData();
        render();
        return;
      }

      adminMode = false;
      completionTracked = false;
      nickname = enteredName;
      writeStorage(STORAGE_KEYS.nickname, nickname);
      trackEvent("start", { nickname });
      step = 1;
      render();
    });
    return;
  }

  if (isQuiz) {
    app.innerHTML = renderQuiz();
    const currentQuestion = QUESTIONS[step - 1];
    app.querySelectorAll("[data-opt-index]").forEach((button) => {
      button.addEventListener("click", () => {
        const i = Number(button.getAttribute("data-opt-index"));
        answers.push(currentQuestion.options[i]);
        trackEvent("progress", {
          nickname,
          questionIndex: answers.length,
        });
        if (answers.length === QUESTIONS.length) {
          step = QUESTIONS.length + 1;
          render();
          if (analysisTimer) clearTimeout(analysisTimer);
          analysisTimer = setTimeout(() => {
            step = QUESTIONS.length + 2;
            analysisTimer = null;
            render();
          }, 5000);
          return;
        } else {
          step += 1;
        }
        render();
      });
    });
    return;
  }

  if (isAnalyzing) {
    app.innerHTML = renderAnalyzing();
    return;
  }

  if (isResult) {
    if (!completionTracked && !forcedSavedResult) {
      const rawScores = getScores();
      const summary = getSummary(rawScores);
      completionTracked = true;
      trackEvent("complete", {
        nickname,
        primary: summary.primary,
        secondary: summary.secondary,
      });
    }
    app.innerHTML = renderResultScreen();
    const resultScores = normalizeScoresToThirty(forcedSavedResult?.rawScores || forcedSavedResult?.normalizedScores || getScores());
    const resultSummary = forcedSavedResult?.summary || getSummary(forcedSavedResult?.rawScores || forcedSavedResult?.normalizedScores || getScores());

    document.getElementById("challenge-team-btn")?.addEventListener("click", async () => {
      try {
        await shareQuizTracked();
      } catch {
        // Ignore clipboard failures.
      }
    });
    ["share-linkedin", "share-x", "share-whatsapp"].forEach((id) => {
      document.getElementById(id)?.addEventListener("click", () => {
        trackEvent("share", {
          primary: resultSummary.primary,
          secondary: resultSummary.secondary,
        });
      });
    });
  }
}

tryHydrateSavedResultMode();
refreshAnalytics();
render();
